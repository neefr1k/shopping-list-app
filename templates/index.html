<!DOCTYPE html>
<html>
<head>
    <title>Мой список покупок</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 3px solid #27ae60;
            padding-bottom: 10px;
        }

        .add-form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 70%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: #27ae60;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background-color: #219a52;
        }

        .shopping-list {
            background: white;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li:last-child {
            border-bottom: none;
        }

        .item-name {
            font-size: 16px;
            color: #333;
        }

        .delete-link {
            background-color: #e74c3c;
            color: white;
            padding: 5px 12px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .delete-link:hover {
            background-color: #c0392b;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1> Список покупок</h1>

    <div class="add-form">
        <form action="/add" method="post">
            <input type="text" name="item" placeholder="Например: молоко, хлеб, яблоки..." required>
            <button type="submit"> Добавить</button>
        </form>
    </div>

    <div class="shopping-list">
        <ul>
            {% if items %}
                {% for item in items %}
                    <li>
                        <span class="item-name">• {{ item }}</span>
                        <a href="/remove/{{ item }}" class="delete-link" onclick="return confirm('Удалить {{ item }}?')">✖ Удалить</a>
                    </li>
                {% endfor %}
            {% else %}
                <li class="empty-message"> Список пуст. Добавьте первый товар!</li>
            {% endif %}
        </ul>
    </div>
</body>
</html>
